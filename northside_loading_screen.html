<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northside RP — Loading Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070707;
      --bg-soft: rgba(8, 8, 8, 0.72);
      --line: rgba(255, 70, 70, 0.18);
      --line-soft: rgba(255, 255, 255, 0.06);
      --red: #d93b3b;
      --red-2: #ff5b5b;
      --red-3: #8f1f1f;
      --text: #f2f2f2;
      --muted: #c8c8c8;
      --shadow: 0 20px 60px rgba(0,0,0,0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 35%, rgba(217,59,59,0.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(217,59,59,0.10), transparent 40%),
        linear-gradient(180deg, #0a0909 0%, #070707 100%);
    }

    .background {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.28), rgba(0,0,0,0.58)),
        url('YOUR_IMAGE_HERE.png') center center / cover no-repeat;
      filter: saturate(1.05) brightness(0.58);
      transform: scale(1.03);
      animation: zoomDrift 18s ease-in-out infinite alternate;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.32) 35%, rgba(0,0,0,0.5) 100%),
        radial-gradient(circle at 50% 30%, rgba(255, 64, 64, 0.08), transparent 30%);
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
      opacity: .35;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="1"/></svg>');
      mix-blend-mode: screen;
    }

    .frame {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .content {
      width: min(1200px, 100%);
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: 24px;
      align-items: center;
      min-height: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .topbar .left,
    .topbar .right {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      padding: 9px 12px;
      border: 1px solid var(--line-soft);
      background: rgba(0,0,0,0.32);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .main {
      display: grid;
      justify-items: center;
      align-items: center;
      text-align: center;
      gap: 14px;
    }

    .skyline {
      width: 340px;
      max-width: 70vw;
      height: 46px;
      opacity: 0.92;
      filter: drop-shadow(0 0 16px rgba(255,60,60,0.24));
    }

    .title {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(64px, 12vw, 152px);
      line-height: 0.9;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 800;
      background: linear-gradient(180deg, #ff8d8d 0%, #ff6363 32%, #d13d3d 58%, #7f2020 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 28px rgba(255, 59, 59, 0.12);
    }

    .subtitle {
      margin-top: -6px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(18px, 2vw, 32px);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.5);
    }

    .status {
      margin-top: 28px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(26px, 3vw, 54px);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      text-shadow: 0 0 16px rgba(0,0,0,0.35);
    }

    .loader-wrap {
      width: min(760px, 86vw);
      margin-top: 6px;
      display: grid;
      gap: 12px;
    }

    .loader {
      height: 46px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(16,16,16,0.88), rgba(6,6,6,0.92));
      box-shadow: inset 0 0 0 2px rgba(0,0,0,0.36), 0 10px 35px rgba(0,0,0,0.38);
      position: relative;
      overflow: hidden;
    }

    .loader::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent 15%, transparent 85%, rgba(255,255,255,0.04));
      pointer-events: none;
    }

    .fill {
      position: absolute;
      inset: 4px auto 4px 4px;
      width: 45%;
      background: linear-gradient(90deg, #ffa2a2 0%, #ff6c6c 20%, #ea4545 50%, #b12525 100%);
      box-shadow: 0 0 18px rgba(255,70,70,0.45), inset 0 0 18px rgba(255,255,255,0.22);
      transition: width .45s ease;
    }

    .fill::after {
      content: "";
      position: absolute;
      top: 0;
      right: -80px;
      width: 100px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.38), transparent);
      transform: skewX(-20deg);
      animation: sweep 2.2s linear infinite;
    }

    .loader-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(20px, 2vw, 34px);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: #ff6a6a;
      text-shadow: 0 0 14px rgba(255, 76, 76, 0.2);
      pointer-events: none;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: rgba(255,255,255,0.62);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .bottom {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 18px;
    }

    .music-btn,
    .action-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,10,0.62);
      color: var(--text);
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .music-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,90,90,0.32);
      background: rgba(18,18,18,0.8);
    }

    .music-btn strong,
    .accent {
      color: #ff6a6a;
    }

    .tipbar {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 10px;
      color: rgba(255,255,255,0.92);
      font-size: clamp(16px, 1.5vw, 24px);
      font-family: "Barlow Condensed", sans-serif;
      letter-spacing: 0.02em;
    }

    .tipbar .label {
      color: #ffb34d;
      margin-right: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border-color: rgba(255, 70, 70, 0.22);
      pointer-events: none;
    }

    .corner.tl { top: 22px; left: 22px; border-top: 1px solid; border-left: 1px solid; }
    .corner.tr { top: 22px; right: 22px; border-top: 1px solid; border-right: 1px solid; }
    .corner.bl { bottom: 22px; left: 22px; border-bottom: 1px solid; border-left: 1px solid; }
    .corner.br { bottom: 22px; right: 22px; border-bottom: 1px solid; border-right: 1px solid; }

    @keyframes zoomDrift {
      from { transform: scale(1.03) translateY(0px); }
      to { transform: scale(1.08) translateY(-10px); }
    }

    @keyframes sweep {
      from { transform: translateX(-140px) skewX(-20deg); }
      to { transform: translateX(300px) skewX(-20deg); }
    }

    @media (max-width: 900px) {
      .bottom {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .topbar {
        justify-content: center;
        text-align: center;
      }

      .topbar .left,
      .topbar .right {
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      .frame { padding: 18px; }
      .loader { height: 40px; }
      .topbar { font-size: 10px; }
      .music-btn, .action-btn { padding: 12px 16px; }
      .corner { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay"></div>
  <div class="grid"></div>
  <div class="noise"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <main class="frame">
    <section class="content">
      <header class="topbar">
        <div class="left">
          <span class="pill">Northside RP</span>
          <span class="pill">Serveur serious roleplay</span>
        </div>
        <div class="right">
          <span class="pill" id="dateTime">00:00</span>
          <button class="action-btn" id="themePulse">Accent rouge</button>
        </div>
      </header>

      <section class="main">
        <svg class="skyline" viewBox="0 0 600 90" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 64H62V36H84V18H110V45H133V9H156V30H175V4H202V49H221V25H247V12H266V41H284V2H320V52H337V28H361V18H389V44H407V8H432V36H458V24H487V14H512V49H540V33H592V64" fill="url(#g)"/>
          <path d="M0 70H600" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="600" y2="90" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff7a7a"/>
              <stop offset="0.45" stop-color="#e74444"/>
              <stop offset="1" stop-color="#911f1f"/>
            </linearGradient>
          </defs>
        </svg>

        <h1 class="title">Northside RP</h1>
        <div class="subtitle">Garry's Mod Roleplay</div>

        <div class="status" id="statusText">Connecting to server...</div>

        <div class="loader-wrap">
          <div class="loader">
            <div class="fill" id="fill"></div>
            <div class="loader-text" id="loaderText">Loading... 45%</div>
          </div>
          <div class="progress-meta">
            <span id="phaseText">Initialisation des ressources</span>
            <span id="percentText">45%</span>
          </div>
        </div>
      </section>

      <footer class="bottom">
        <button class="music-btn" id="musicToggle">♫ <strong>Musique OFF</strong></button>

        <div class="tipbar">
          <span class="label">Astuce :</span>
          <span id="tipText">Utilise /me pour décrire précisément les actions de ton personnage.</span>
        </div>

        <button class="action-btn" id="simulateBtn">Simuler le chargement</button>
      </footer>
    </section>
  </main>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const tips = [
      "Utilise /me pour décrire précisément les actions de ton personnage.",
      "Un personnage cohérent rend le roleplay plus crédible pour tout le monde.",
      "Privilégie des scènes calmes et construites plutôt qu'un RP précipité.",
      "Lis les règles et les annexes avant de rejoindre une faction du serveur.",
      "Un serveur serious repose autant sur l'ambiance que sur le respect mutuel."
    ];

    const phases = [
      "Connexion au serveur",
      "Initialisation des ressources",
      "Téléchargement du contenu",
      "Chargement de l'interface",
      "Synchronisation des données",
      "Préparation de la session"
    ];

    const statuses = [
      "Connecting to server...",
      "Downloading content...",
      "Preparing interface...",
      "Synchronizing data...",
      "Finalizing connection..."
    ];

    const tipText = document.getElementById('tipText');
    const phaseText = document.getElementById('phaseText');
    const statusText = document.getElementById('statusText');
    const loaderText = document.getElementById('loaderText');
    const percentText = document.getElementById('percentText');
    const fill = document.getElementById('fill');
    const dateTime = document.getElementById('dateTime');
    const simulateBtn = document.getElementById('simulateBtn');
    const themePulse = document.getElementById('themePulse');
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');

    let tipIndex = 0;
    let phaseIndex = 1;
    let statusIndex = 0;
    let progress = 45;
    let isPlaying = false;

    function updateClock() {
      const now = new Date();
      dateTime.textContent = now.toLocaleString('fr-FR', {
        hour: '2-digit',
        minute: '2-digit',
        day: '2-digit',
        month: '2-digit'
      });
    }

    function updateProgress(value) {
      progress = Math.max(0, Math.min(100, value));
      fill.style.width = progress + '%';
      loaderText.textContent = `Loading... ${progress}%`;
      percentText.textContent = `${progress}%`;
      phaseText.textContent = phases[Math.min(phases.length - 1, Math.floor(progress / 20))];
      statusText.textContent = statuses[Math.min(statuses.length - 1, Math.floor(progress / 25))];
    }

    setInterval(() => {
      tipIndex = (tipIndex + 1) % tips.length;
      tipText.textContent = tips[tipIndex];
    }, 4500);

    setInterval(() => {
      phaseIndex = (phaseIndex + 1) % phases.length;
      statusIndex = (statusIndex + 1) % statuses.length;
      if (progress < 95) updateProgress(progress + 1);
    }, 2600);

    setInterval(updateClock, 1000);
    updateClock();
    updateProgress(progress);

    simulateBtn.addEventListener('click', () => {
      let fakeProgress = 0;
      const runner = setInterval(() => {
        fakeProgress += Math.floor(Math.random() * 8) + 3;
        updateProgress(fakeProgress);
        if (fakeProgress >= 100) {
          updateProgress(100);
          statusText.textContent = 'Connection established';
          phaseText.textContent = 'Chargement terminé';
          clearInterval(runner);
          setTimeout(() => {
            updateProgress(45);
            statusText.textContent = 'Connecting to server...';
            phaseText.textContent = 'Initialisation des ressources';
          }, 1800);
        }
      }, 260);
    });

    musicToggle.addEventListener('click', async () => {
      try {
        if (!isPlaying) {
          await bgMusic.play();
          isPlaying = true;
          musicToggle.innerHTML = '♫ <strong>Musique ON</strong>';
        } else {
          bgMusic.pause();
          isPlaying = false;
          musicToggle.innerHTML = '♫ <strong>Musique OFF</strong>';
        }
      } catch (err) {
        musicToggle.innerHTML = '♫ <strong>Lecture bloquée</strong>';
      }
    });

    themePulse.addEventListener('click', () => {
      document.body.animate([
        { filter: 'brightness(1)' },
        { filter: 'brightness(1.08)' },
        { filter: 'brightness(1)' }
      ], {
        duration: 600,
        easing: 'ease-out'
      });
    });

    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 12;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      document.querySelector('.background').style.transform = `scale(1.06) translate(${x}px, ${y}px)`;
    });
  </script>
</body>
</html>
