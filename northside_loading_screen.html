<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northside RP — Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:     #c0392b;
      --red-hot: #ff4d3a;
      --red-dim: #7a1f16;
      --gold:    #d4a843;
      --bg:      #050507;
      --panel:   rgba(8, 8, 12, 0.82);
      --text:    #e8e4de;
      --muted:   #7a7672;
      --line:    rgba(192, 57, 43, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }

    /* ─── CANVAS PARTICULES ─── */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* ─── FOND IMAGE ─── */
    .bg-image {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: url('YOUR_IMAGE_HERE.jpg') center/cover no-repeat;
      filter: brightness(0.28) saturate(0.7);
      animation: bgDrift 22s ease-in-out infinite alternate;
      transform-origin: center center;
    }

    @keyframes bgDrift {
      0%   { transform: scale(1.06) translate(0px, 0px); }
      33%  { transform: scale(1.09) translate(-8px, -5px); }
      66%  { transform: scale(1.07) translate(6px, -8px); }
      100% { transform: scale(1.1)  translate(-4px, 4px); }
    }

    /* ─── VIGNETTE ─── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 80% 60% at 50% 45%, transparent 0%, rgba(0,0,0,0.72) 100%),
        linear-gradient(to bottom, rgba(5,5,7,0.55) 0%, transparent 25%, transparent 70%, rgba(5,5,7,0.9) 100%);
      pointer-events: none;
    }

    /* ─── LUEUR ROUGE AMBIANCE ─── */
    .glow-orb {
      position: fixed;
      z-index: 2;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      animation: orbPulse 6s ease-in-out infinite;
    }
    .glow-orb.top {
      width: 600px; height: 300px;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(192,57,43,0.22), transparent 70%);
    }
    .glow-orb.bottom {
      width: 800px; height: 200px;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(192,57,43,0.12), transparent 70%);
      animation-delay: -3s;
    }
    @keyframes orbPulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }

    /* ─── LIGNES SCANLINES ─── */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }

    /* ─── COINS DECORATIFS ─── */
    .corners {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 56px; height: 56px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--red);
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }
    .corner.tl { top: 20px; left: 20px; }
    .corner.tl::before { top: 0; left: 0; }
    .corner.tl::after  { top: 0; left: 0; }
    .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner.tr::before { top: 0; left: 0; }
    .corner.tr::after  { top: 0; left: 0; }
    .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner.bl::before { top: 0; left: 0; }
    .corner.bl::after  { top: 0; left: 0; }
    .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }
    .corner.br::before { top: 0; left: 0; }
    .corner.br::after  { top: 0; left: 0; }

    /* ─── LIGNE HORIZONTALE TOP ─── */
    .h-line-top, .h-line-bot {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      z-index: 4;
      pointer-events: none;
    }
    .h-line-top {
      top: 68px;
      background: linear-gradient(90deg, transparent, var(--red) 20%, var(--red) 80%, transparent);
      opacity: 0.3;
    }
    .h-line-bot {
      bottom: 78px;
      background: linear-gradient(90deg, transparent, var(--red) 20%, var(--red) 80%, transparent);
      opacity: 0.2;
    }

    /* ─── LAYOUT ─── */
    .frame {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 36px;
      animation: fadeIn 1.2s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .topbar-left { display: flex; gap: 20px; align-items: center; }
    .topbar-right { display: flex; gap: 20px; align-items: center; }

    .tag {
      padding: 5px 10px;
      border: 1px solid rgba(192,57,43,0.2);
      background: rgba(192,57,43,0.06);
      color: rgba(232,228,222,0.6);
      letter-spacing: 0.1em;
    }
    .tag.live {
      border-color: rgba(192,57,43,0.4);
      color: var(--red-hot);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag.live::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red-hot);
      box-shadow: 0 0 6px var(--red-hot);
      animation: blink 1.4s ease infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ─── CENTRE ─── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
      animation: centerReveal 1.4s cubic-bezier(.16,1,.3,1) 0.2s both;
    }
    @keyframes centerReveal {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Skyline SVG */
    .skyline-wrap {
      margin-bottom: -4px;
      opacity: 0.75;
      filter: drop-shadow(0 0 20px rgba(192,57,43,0.5));
    }
    .skyline-wrap svg {
      width: clamp(280px, 45vw, 580px);
      height: auto;
    }

    /* Titre principal */
    .title-wrap {
      position: relative;
      display: inline-block;
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 14vw, 190px);
      line-height: 0.88;
      letter-spacing: 0.04em;
      color: transparent;
      background: linear-gradient(175deg,
        #ffffff 0%,
        #f0c8c8 15%,
        #e07070 35%,
        #c0392b 55%,
        #8a1e14 75%,
        #4a0e08 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    /* Ombre rouge en dessous */
    .title-shadow {
      position: absolute;
      inset: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 14vw, 190px);
      line-height: 0.88;
      letter-spacing: 0.04em;
      color: var(--red);
      filter: blur(28px);
      opacity: 0.35;
      z-index: 0;
      animation: titleGlow 4s ease-in-out infinite;
      pointer-events: none;
      -webkit-user-select: none;
    }
    @keyframes titleGlow {
      0%, 100% { opacity: 0.25; filter: blur(28px); }
      50%       { opacity: 0.45; filter: blur(20px); }
    }

    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(13px, 1.8vw, 22px);
      font-weight: 600;
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-top: 6px;
      margin-bottom: 28px;
    }

    /* Séparateur rouge */
    .sep {
      width: clamp(120px, 18vw, 260px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      margin: 0 auto 28px;
      position: relative;
    }
    .sep::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%; transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--red-hot);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--red-hot);
    }

    /* Status text */
    .status {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(12px, 1.3vw, 16px);
      letter-spacing: 0.12em;
      color: rgba(232,228,222,0.45);
      text-transform: uppercase;
      margin-bottom: 18px;
      min-height: 20px;
      transition: opacity 0.4s ease;
    }
    .status .cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--red-hot);
      margin-left: 4px;
      vertical-align: middle;
      animation: cursor 1s step-end infinite;
    }
    @keyframes cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ─── BARRE DE PROGRESSION ─── */
    .progress-wrap {
      width: clamp(280px, 55vw, 700px);
      animation: progressReveal 1.6s cubic-bezier(.16,1,.3,1) 0.5s both;
    }
    @keyframes progressReveal {
      from { opacity: 0; transform: scaleX(0.85); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .progress-labels .phase { color: rgba(232,228,222,0.55); }

    .bar-outer {
      position: relative;
      height: 3px;
      background: rgba(255,255,255,0.06);
      overflow: visible;
    }
    .bar-track {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red-dim), var(--red), var(--red-hot));
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 3px; height: 9px;
      background: #fff;
      box-shadow: 0 0 10px var(--red-hot), 0 0 20px var(--red-hot);
    }
    /* Reflet sweep */
    .bar-sweep {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bar-sweep::after {
      content: '';
      position: absolute;
      top: 0; left: -60px;
      width: 60px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: sweep 2.8s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { left: -60px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { left: 110%; opacity: 0; }
    }

    .bar-percent {
      position: absolute;
      right: 0; top: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--red-hot);
      line-height: 1;
      text-shadow: 0 0 20px rgba(255,77,58,0.5);
      transition: all 0.4s ease;
    }

    /* Segments décoratifs sous la barre */
    .bar-segments {
      display: flex;
      gap: 2px;
      margin-top: 6px;
    }
    .seg {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.05);
      transition: background 0.4s ease;
    }
    .seg.active { background: rgba(192,57,43,0.45); }

    /* ─── FOOTER ─── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      animation: fadeIn 1.8s ease 0.8s both;
    }

    .footer-left { display: flex; flex-direction: column; gap: 8px; }
    .footer-right { display: flex; gap: 12px; align-items: center; }

    /* Tips */
    .tip-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: clamp(280px, 45vw, 560px);
    }
    .tip-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: var(--gold);
      white-space: nowrap;
      padding-top: 2px;
      text-shadow: 0 0 10px rgba(212,168,67,0.4);
    }
    .tip-text {
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 500;
      color: rgba(232,228,222,0.65);
      line-height: 1.4;
      transition: opacity 0.5s ease;
    }
    .tip-text.fade { opacity: 0; }

    /* Boutons */
    .btn {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgba(192,57,43,0.3);
      color: var(--muted);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(192,57,43,0.08);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }
    .btn:hover { color: var(--text); border-color: var(--red); }
    .btn:hover::before { transform: scaleX(1); }
    .btn.music-on { color: var(--red-hot); border-color: rgba(192,57,43,0.5); }

    /* Infos server */
    .server-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: right;
      text-transform: uppercase;
    }
    .server-info span { opacity: 0.6; }
    .server-info strong { color: rgba(232,228,222,0.7); font-weight: normal; }

    /* ─── INTRO CINÉMATIQUE ─── */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: introFade 0.8s ease 1.8s forwards;
    }
    @keyframes introFade {
      to { opacity: 0; pointer-events: none; }
    }
    .intro-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 80px);
      letter-spacing: 0.3em;
      color: var(--red);
      text-transform: uppercase;
      animation: introReveal 1.4s cubic-bezier(.16,1,.3,1) both;
      text-shadow: 0 0 40px rgba(192,57,43,0.6);
    }
    @keyframes introReveal {
      from { opacity: 0; letter-spacing: 0.8em; filter: blur(8px); }
      to   { opacity: 1; letter-spacing: 0.3em; filter: blur(0); }
    }
    .intro-line {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      animation: introLine 1.2s ease 0.3s both;
    }
    .intro-line.top { top: 38%; }
    .intro-line.bot { bottom: 38%; }
    @keyframes introLine {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 0.5; transform: scaleX(1); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .frame { padding: 16px 20px; }
      .footer { flex-direction: column; gap: 16px; align-items: center; }
      .tip-wrap { max-width: 100%; }
      .server-info { text-align: center; }
      .topbar-right .tag:not(.live) { display: none; }
    }
  </style>
</head>

    <div class="intro-line bot"></div>

  <div class="glow-orb top"></div>

              <stop offset="0%"   stop-color="#c0392b" stop-opacity="0.9"/>
              <stop offset="60%"  stop-color="#7a1f16" stop-opacity="0.8"/>
              <stop offset="100%" stop-color="#1a0a08" stop-opacity="0.6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Titre -->
      <div class="title-wrap">
        <div class="title-shadow" aria-hidden="true">NORTHSIDE RP</div>
        <h1 class="title">NORTHSIDE RP</h1>
      </div>

      <div class="subtitle">Garry's Mod &nbsp;·&nbsp; Serious Roleplay</div>
      <div class="sep"></div>

      <div class="status" id="statusText">
        <span id="statusInner">Connexion au serveur</span><span class="cursor"></span>
      </div>

      <!-- Barre de progression -->
      <div class="progress-wrap">
        <div class="progress-labels">
          <span class="phase" id="phaseText">Initialisation</span>
          <span id="etaText">—</span>
        </div>
        <div class="bar-outer">
          <div class="bar-track">
            <div class="bar-fill" id="barFill"></div>
          </div>
          <div class="bar-sweep"></div>
          <div class="bar-percent" id="barPercent">0%</div>
        </div>
        <div class="bar-segments" id="segments"></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-left">
        <div class="tip-wrap">
          <span class="tip-label">ASTUCE</span>
          <span class="tip-text" id="tipText">Utilise /me pour décrire les actions de ton personnage.</span>
        </div>
      </div>
      <div class="footer-right">
        <button class="btn" id="musicBtn">♫ MUSIQUE</button>
        <div class="server-info">
          <span>Northside RP &nbsp;<strong>v2.0</strong></span>
          <span id="dateDisplay">—</span>
        </div>
      </div>
    </div>

  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script>
    // ─── PARTICULES ───
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size  = Math.random() * 1.2 + 0.2;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = -Math.random() * 0.4 - 0.1;
        this.life  = 0;
        this.maxLife = Math.random() * 200 + 100;
        this.type  = Math.random() > 0.7 ? 'ember' : 'dust';
        if (this.type === 'ember') {
          this.x = Math.random() * canvas.width;
          this.y = canvas.height + 10;
          this.speedY = -Math.random() * 0.8 - 0.3;
          this.speedX = (Math.random() - 0.5) * 0.6;
          this.size   = Math.random() * 1.5 + 0.5;
        }
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life++;
        if (this.life > this.maxLife || this.y < -10) this.reset();
      }
      draw() {
        const prog = this.life / this.maxLife;
        const alpha = this.type === 'ember'
          ? Math.sin(prog * Math.PI) * 0.7
          : (prog < 0.2 ? prog / 0.2 : prog > 0.8 ? (1 - prog) / 0.2 : 1) * 0.25;
        if (this.type === 'ember') {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${192 + Math.random()*40}, ${57 + Math.random()*30}, 43, ${alpha})`;
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(232, 228, 222, ${alpha * 0.4})`;
          ctx.fill();
        }
      }
    }

    for (let i = 0; i < 120; i++) {
      const p = new Particle();
      p.life = Math.random() * p.maxLife;
      particles.push(p);
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ─── SEGMENTS ───
    const segCount = 20;
    const segWrap = document.getElementById('segments');
    for (let i = 0; i < segCount; i++) {
      const s = document.createElement('div');
      s.className = 'seg';
      s.id = 'seg' + i;
      segWrap.appendChild(s);
    }

    // ─── DONNÉES ───
    const tips = [
      "Utilise /me pour décrire précisément les actions de ton personnage.",
      "Un personnage cohérent et réaliste rend le roleplay plus immersif.",
      "Privilégie des scènes construites plutôt qu'un RP précipité.",
      "Lis le règlement et les annexes avant de rejoindre une faction.",
      "Le serious RP repose autant sur l'ambiance que sur le respect mutuel.",
      "Reste dans le personnage même dans les situations difficiles.",
      "Communique avec les autres joueurs hors RP si nécessaire via /ooc.",
    ];
    const phases = [
      "Connexion au serveur",
      "Vérification des ressources",
      "Téléchargement du contenu",
      "Chargement des modèles",
      "Initialisation du HUD",
      "Synchronisation des données",
      "Préparation de la session",
      "Finalisation...",
    ];

    let tipIdx = 0, phaseIdx = 0, progress = 0;
    const tipEl     = document.getElementById('tipText');
    const phaseEl   = document.getElementById('phaseText');
    const statusEl  = document.getElementById('statusInner');
    const fillEl    = document.getElementById('barFill');
    const percentEl = document.getElementById('barPercent');
    const etaEl     = document.getElementById('etaText');
    const clockEl   = document.getElementById('clock');
    const dateEl    = document.getElementById('dateDisplay');

    function updateProgress(val) {
      progress = Math.max(0, Math.min(100, val));
      fillEl.style.width = progress + '%';
      percentEl.textContent = Math.round(progress) + '%';
      phaseEl.textContent = phases[Math.min(phases.length - 1, Math.floor(progress / (100 / phases.length)))];
      const remaining = Math.round((100 - progress) / 3.5);
      etaEl.textContent = progress >= 99 ? 'Prêt !' : remaining + 's restantes';
      // Segments
      const activeSeg = Math.floor(progress / 100 * segCount);
      for (let i = 0; i < segCount; i++) {
        document.getElementById('seg' + i).className = 'seg' + (i < activeSeg ? ' active' : '');
      }
    }

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      dateEl.textContent  = now.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    // Rotation tips avec fondu
    setInterval(() => {
      tipEl.classList.add('fade');
      setTimeout(() => {
        tipIdx = (tipIdx + 1) % tips.length;
        tipEl.textContent = tips[tipIdx];
        tipEl.classList.remove('fade');
      }, 500);
    }, 5500);

    // Auto-progress simulé (remplacé par les hooks GMod en prod)
    let autoInt = setInterval(() => {
      if (progress < 92) {
        const step = Math.random() * 2.5 + 0.5;
        updateProgress(progress + step);
      }
    }, 900);

    setInterval(updateClock, 1000);
    updateClock();
    updateProgress(0);

    // ─── HOOKS GMOD ───
    // Ces fonctions sont appelées automatiquement par GMod
    function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
      document.getElementById('playerCount').textContent = '— / ' + maxplayers;
    }
    function SetStatusChanged(status) {
      statusEl.textContent = status;
    }
    function DownloadingFile(fileName) {
      statusEl.textContent = 'Téléchargement : ' + fileName;
    }
    function LoadingProgress(progress_val) {
      clearInterval(autoInt);
      updateProgress(progress_val * 100);
    }

    // ─── MUSIQUE ───
    const musicBtn = document.getElementById('musicBtn');
    const bgMusic  = document.getElementById('bgMusic');
    let playing = false;
    musicBtn.addEventListener('click', async () => {
      try {
        if (!playing) {
          await bgMusic.play();
          playing = true;
          musicBtn.textContent = '■ MUSIQUE';
          musicBtn.classList.add('music-on');
        } else {
          bgMusic.pause();
          playing = false;
          musicBtn.textContent = '♫ MUSIQUE';
          musicBtn.classList.remove('music-on');
        }
      } catch {}
    });

    // ─── PARALLAXE SOURIS ───
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth  - 0.5) * 10;
      const y = (e.clientY / window.innerHeight - 0.5) * 8;
      document.querySelector('.bg-image').style.transform =
        `scale(1.08) translate(${x}px, ${y}px)`;
    });
  </script>
</body>
</html>
